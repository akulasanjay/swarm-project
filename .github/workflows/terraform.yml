name: Terraform

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Prevent overlapping runs from racing on the same state.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write   # needed to post the plan as a PR comment
  id-token: write        # needed for AWS OIDC auth

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.14.3
  # Avoid colour codes in the captured plan output.
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    name: Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform fmt (check)
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const output = `#### Terraform fmt 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform init ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply
    needs: terraform
    runs-on: ubuntu-latest
    # Only apply on a direct push to the default branch, never on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    # Requires a GitHub Environment named "production" (Settings → Environments).
    # Add required reviewers there to gate apply behind a manual approval.
    environment: production
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve
